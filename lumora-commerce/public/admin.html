<!doctype html><html lang="en" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LUMORA Admin</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" href="/assets/style.css"><link rel="stylesheet" href="/assets/admin.css"></head><body><div id="admin"></div><div class="modalLayer" id="editModal"><div class="modalCard adminModal"><button class="modalClose" id="closeEdit"><i class="bi bi-x-lg"></i></button><form id="productForm"><h2 id="formTitle">Add product</h2><input id="editId" type="hidden"><div class="field"><label>Name</label><input id="pName" required></div><div class="row2"><div class="field"><label>Category</label><input id="pCategory" required></div><div class="field"><label>Color</label><input id="pColor" required></div></div><div class="row2"><div class="field"><label>Price</label><input id="pPrice" type="number" required></div><div class="field"><label>Stock</label><input id="pStock" type="number" required></div></div><div class="field"><label>Image URL</label><input id="pImage" required></div><div class="field"><label>Description</label><textarea id="pDescription" rows="4" required></textarea></div><button class="primary full">Save product</button></form></div></div><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script><script src="/assets/admin.js"></script></body></html>
